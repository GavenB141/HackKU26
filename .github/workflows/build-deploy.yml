name: Build + Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-game-site:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build and install raylib
        run: |
          git clone https://github.com/raysan5/raylib.git
          cd raylib/src
          emmake make PLATFORM=PLATFORM_WEB

      - name: Build game
        run: |
          mkdir -pv site
          make -C game web RAYLIB=../raylib/src/

      - name: Prepare site
        run: |
          cp -v public/* site/ || true
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-game:
    needs: build-game-site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
